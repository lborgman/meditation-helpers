    <style>
        /* FIX-ME: wide screen */

        /* https://dev.to/adbutterfield/custom-styling-checkboxes-the-modern-way-3o42 */
        :root {
            --icon-button-size: 48;
            --checkbox-border-color: #8b8c89;
            --checkbox-checked-color: #274c77;
            --checkbox-checked-color: orange;
            --checkbox-checked-color: darkorange;
            --checkbox-hover-color: #a3cef1;
            --checkbox-hover-color: #a3cef133;
            --checkbox-hover-color: red;
            --checkbox-hover-color: orange;
            --checkbox-disabled-bg-color: #d9d9d9;
        }

        :root {
            --some-gold: color-mix(in oklab, gold 60%, transparent 50%);
            /* --some-gold: lightskyblue; */
            --some-yellowgreen: color-mix(in oklab, yellowgreen 100%, transparent 100%);
            --some-white: color-mix(in oklab, white 60%, transparent 100%);
        }

        input[type="checkbox"] {
            box-sizing: border-box;
            width: 20px;
            width: 1rem;
            height: 20px;
            height: 1rem;
            padding: 0;
            border: 2px solid var(--checkbox-border-color);
            appearance: none;
            background-color: transparent;
            outline: none;
            transition: outline 0.1s, background-color 0.7s, border-color 0.7s;
        }

        input[type="checkbox"]:checked {
            background-size: cover;
            padding: 2px;
        }

        input[type="checkbox"]:not(:disabled):checked {
            border-color: var(--checkbox-checked-color);
            background-color: var(--checkbox-checked-color);
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="20" height="20" viewBox="0 0 32 32" xml:space="preserve"><path style="fill: %23274c77" d="M11.941,28.877l-11.941-11.942l5.695-5.696l6.246,6.246l14.364-14.364L32,8.818"/></svg>');
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="20" height="20" viewBox="0 0 32 32" xml:space="preserve"><path style="fill: black" d="M11.941,28.877l-11.941-11.942l5.695-5.696l6.246,6.246l14.364-14.364L32,8.818"/></svg>');
        }

        input[type="checkbox"]:disabled {
            background-color: var(--checkbox-disabled-bg-color);
        }

        input[type="checkbox"]:disabled:checked {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="20" height="20" viewBox="0 0 32 32" xml:space="preserve"><path style="fill: %238b8c89" d="M11.941,28.877l-11.941-11.942l5.695-5.696l6.246,6.246l14.364-14.364L32,8.818"/></svg>');
        }

        @media (hover: hover) {
            input[type="checkbox"]:not(:disabled):hover {
                background-color: var(--checkbox-hover-color);
                outline: 6px solid var(--checkbox-hover-color);
                transform: scale(1.05);
            }
        }

        input[type="checkbox"]:focus-visible {
            outline: 6px solid var(--checkbox-hover-color);
            transform: scale(1.05);
        }

        label:has(input[type=checkbox]) {
            display: flex;
            align-items: center;
        }


        body {
            background: black;
            color: orange;
        }


        .running #pattern-buttons {
            opacity: 0.2;
            filter: grayscale();
        }

        .running #start-button {
            display: none;
        }

        .running #settings-button {
            display: none;
        }


        #div-control-image {
            display: flex;
        }

        .running #div-control-image {
            display: none;
        }


        #set-time {
            display: inline-flex;
        }

        .running #set-time {
            display: none;
        }

        #current-progress {
            background-color: yellow;
            background-color: yellowgreen;
            width: 5px;
            height: 100%;
            border-radius: 5px;
        }

        #progress {
            background-color: #9acd3254;
            opacity: 0.4;
            width: 80%;
            height: 10px;
            border-radius: 5px;
            display: none;
        }

        .running #progress {
            display: inline-block;
        }


        #current-patt-parts.holdLow .holdLow {
            color: yellow;
        }

        #current-patt-parts.holdHigh .holdHigh {
            color: yellow;
        }

        #current-patt-parts.breathIn .breathIn {
            color: yellow;
        }

        #current-patt-parts.breathOut .breathOut {
            color: yellow;
        }


        #replay-button {
            display: none;
        }

        .running #replay-button {
            display: unset;
        }


        div.mdc-dialog__surface:has(.colored-dialog) {
            background-color: orange;
        }

        div.mdc-dialog__surface:has(.extimg-colored-dialog) {
            background-color: orange;
        }

        div.mdc-dialog__surface:has(.extimg-copyright) {
            background-color: wheat;
            border: solid 5px blue;
        }

        #extimg-new-preview {
            display: none;
        }

        #extimg-add-new:focus-within #extimg-new-preview {
            display: grid;
        }

        #elt-filter {
            opacity: 0;
        }

        .use-dawn-filter #elt-filter {
            opacity: 1;
        }



        /****** Slider according to w3 Schools ****/
        .NOslidecontainer {
            width: 100%;
        }

        .slider {
            appearance: none;
            width: 100%;
            height: 10px;
            border-radius: 4px;
            background: olive;
            outline: none;
            opacity: 0.7;
            transition: opacity .2s;
        }

        .slider:hover {
            opacity: 1;
        }

        /* The slider handle (use -webkit- (Chrome, Opera, Safari, Edge) and -moz- (Firefox) to override default look) */
        .slider::-webkit-slider-thumb {
            appearance: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: olive;
            cursor: pointer;
        }



        #button-wa1 {
            background: lightblue;
        }

        #div-test-webaudio {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #div-test-webaudio label {
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 10px;
        }

        #div-test-webaudio input[type=number] {
            width: 60px;
        }


        #div-dialog-overtone {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #div-dialog-overtone label {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 10px;
        }

        #div-dialog-overtone input[type=number] {
            width: 60px;
        }

        button.test-sound-playing {
            outline: 5px dotted red;
        }


        /*********************************************/
        /* Tests for virtual keyboard */
        /*********************************************/
        .has-virtual-keyboard body {
            background: red;
        }

        #div-log2screen {
            background-color: skyblue;
            color: black;
        }

        #div-log2screen.old {
            background-color: midnightblue;
            color: white;
        }



        /************/
        span.var-pattern-part {
            padding: 4px;
            background: #fff3;
            border-radius: 4px;
            border: 1px solid gray;
        }

        button.var-pattern-button {
            display: none;
        }

        span.var-pattern-part.active {
            padding: 8px;
            display: inline-flex;
            gap: 10px;

            button.var-pattern-button {
                display: unset;
            }
        }



        /***************************/
        /** Panels, fading in/out **/
        /***************************/

        .panel {
            display: flex;
            flex-wrap: wrap;
            gap: 17px;
            opacity: 1;
            transform: none;
            transition: opacity 4s, transform 4s, display 1s 4s;
            transition-behavior: allow-discrete;

        }

        .panel.hidden {
            display: none;
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 4s 4s, transform 4s 4s, display 0s;
            transition-behavior: allow-discrete;
        }

        @starting-style {
            .panel:not(.hidden) {
                opacity: 0;
            }
        }



        /*********************/
        /*** Feedback dialog */
        /*********************/
        * {
            scrollbar-gutter: stable;
            scrollbar-width: thin;
            scrollbar-color: #fff3 #0003;
        }


        #feedback-cats {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px 15px 0px;

            .cat-div {
                display: block;
                width: 100%;
                position: relative;
                padding: 15px;
                border: 1px solid gray;
                border-radius: 15px;
            }

            .cat-name {
                position: absolute;
                left: 10px;
                top: calc(-1rem + 2px);
                background: orange;
                padding: 0px 8px;
                font-weight: bold;
                display: flex;
                align-items: center;
                gap: 7px;
                text-transform: capitalize;
            }



            div.cat-div {
                border: 1px solid gray;
            }

            span.cat-name.stop::before {
                content: url("./img/stop.svg");
                display: inline-block;
                height: 1rem;
                aspect-ratio: 1 / 1;
                margin-bottom: 0.3rem;
                margin-right: 0;
            }


            span.cat-name.warn::before {
                content: url("./img/warn.svg");
                display: inline-block;
                height: 1rem;
                aspect-ratio: 100 / 86;
                margin-bottom: 0.3rem;
                margin-right: 0;
            }



            .cat-name.required::after {
                content: "Please tell!";
                background-color: var(--some-gold);
                text-transform: none;
                font-weight: normal;
                padding: 0px 7px;
                border-radius: 5px;
            }

            div:has(input:checked) .cat-name.required::after {
                content: "Thanks!";
                color: unset;
                background-color: yellowgreen;
                background-color: greenyellow;
                background-color: var(--some-yellowgreen);
            }

            #feedback-cats:has(#chk-security:checked) {
                #div-cats-bad {
                    label:has(input:checked) {
                        color: red;
                    }
                }
            }

            label:has(#chk-security) {
                margin-bottom: 15px;
            }



        }

        #elt-old-speed {
            font-size: 1.5rem;
        }

        #elt-new-speed {
            font-size: 1.5rem;
        }

        #notice-now {
            font-weight: bold;
            padding: 10px;
            background-color: var(--some-gold);
            padding: 4px;
            border-radius: 5px;
        }

        #div-feedback-result {
            display: flex;
            flex-direction: column;
            background-color: gold;
            background-color: var(--some-gold);
            border-radius: 5px;
            padding: 8px;
        }

        /* #elt-new-factor {} */

        #elt-new-factor-value {
            padding: 2px;
            border-radius: 3px;
            background-color: var(--some-yellowgreen);
        }

        #elt-explain-speed {
            padding: 8px;
            padding-left: 15px;
            /* background: #fff3; */
            background: var(--some-white);
            border-radius: 3px;
        }

        .elt-speed {
            font-style: italic;
        }

        #elt-explain-speed {
            .elt-speed {
                font-weight: bold;
            }
        }
    </style>
